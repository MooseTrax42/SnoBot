notes:
  - All floating point values use 2-decimal precision for consistency
  - Arduino uses single-precision float (32-bit IEEE 754)
  - Message parsing budget: 5ms max per message on Arduino
  - Serial buffer overflow discards oldest data (FIFO)
  - Timestamps wraparound after ~49.7 days (uint32_t milliseconds)
  - IMU data filtered with complementary filter on Arduino
  - Encoder values are cumulative since power-on (not velocity)
  - Temperature monitoring every 1s, automatic shutdown at 80°C
  - E-stop is fail-safe: power loss = motors disabled
  - All state transitions logged in EVENT telemetry
  - Protocol is version-negotiated during HELLO handshake

