# SnoBot Robot Physical Parameters.
# These values are used for odometry calculations and path planning.

robot:
  # Drivetrain geometry (from Arduino config.h).
  wheelbase_m: 0.588625     # Distance between left and right wheels (meters).
  wheel_radius_m: 0.127     # Wheel radius (meters).

  # Encoder specifications (from Arduino config.h).
  encoder_ticks_per_rev: 1200   # Encoder resolution (ticks/revolution).
  gear_ratio: 18.0              # Motor gearbox ratio.

  # Calculated encoder parameter assuming linked to motor directly.
  # ticks_per_meter = (ticks_per_rev * gear_ratio) / (2 * pi * wheel_radius)
  # ticks_per_meter = (1200 * 18.0) / (2 * 3.14159 * 0.127) = 21600 / 0.7980 = 27068.9

  # Assuming linked to wheel directly.
  # ticks_per_meter = (ticks_per_rev) / (2 * pi * wheel_radius)
  # ticks_per_meter = (1200) / (2 * 3.14159 * 0.127) = 1200 / 0.7980 = 1503.8

  # Physical dimensions.
  robot_width_m: 0.61        # Overall width for collision checking.
  robot_length_m: 0.61       # Overall length for collision checking.

  # Velocity limits (from Arduino config.h).
  max_linear_velocity_ms: 1.35      # Maximum linear velocity (m/s).
  max_angular_velocity_rads: 3.14   # Maximum angular velocity (rad/s).

  # Conservative autonomous limits.
  max_velocity_auto_ms: 1.0         # Maximum velocity in autonomous mode.
  max_angular_velocity_auto_rads: 1.5  # Maximum angular velocity in autonomous mode.

  # Minimum turning radius (for path planning).
  min_turning_radius_m: 0.152    # Approximate minimum turn radius for differential drive.

# Odometry configuration.
odometry:
  # Update rate.
  update_rate_hz: 12.0    # Match Arduino telemetry rate.

  # Calibration factors (tuned experimentally).
  left_wheel_scale: 1.0   # Calibration multiplier for left encoder.
  right_wheel_scale: 1.0  # Calibration multiplier for right encoder.

  # IMU fusion.
  use_imu_heading: true   # Use IMU yaw for heading correction.
  imu_weight: 0.3         # Weight for IMU vs encoder heading (0.0 = encoders only, 1.0 = IMU only).

  # Noise and uncertainty.
  encoder_noise_stddev: 0.01  # Standard deviation of encoder measurement noise (meters).
  imu_noise_stddev: 0.05      # Standard deviation of IMU measurement noise (radians).
